name: Build and Release Ktsu Plugins

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build all plugins
        run: ./gradlew packagePlugin --parallel

      - name: Generate repo.json
        run: |
          python3 - <<'EOF'
          import json, os

          plugins = []
          dist_dir = "dist"
          base_url = "https://github.com/TamerAli-0/omnistream-ktsu-plugins/releases/download/latest"

          for omni_file in sorted(os.listdir(dist_dir)):
              if not omni_file.endswith(".omni"):
                  continue
              plugin_name = omni_file[:-5]
              module_dir = f"plugin-{plugin_name}"
              manifest_path = os.path.join(module_dir, "src", "main", "assets", "plugin.json")
              if not os.path.exists(manifest_path):
                  continue
              with open(manifest_path) as f:
                  manifest = json.load(f)
              manifest["downloadUrl"] = f"{base_url}/{omni_file}"
              plugins.append(manifest)

          repo_index = {"name": "OmniStream Ktsu Plugins", "plugins": plugins}
          with open("repo.json", "w") as f:
              json.dump(repo_index, f, indent=2)
          print(f"Generated repo.json with {len(plugins)} plugin(s)")
          EOF

      - name: List built .omni files
        run: ls -la dist/

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release and upload .omni files
        run: |
          gh release create latest dist/*.omni \
            --title "Latest Ktsu Plugins" \
            --notes "Auto-built from main branch. Add this repo URL in OmniStream Plugin Manager." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated repo.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add repo.json
          git diff --staged --quiet || git commit -m "chore: update repo.json [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
